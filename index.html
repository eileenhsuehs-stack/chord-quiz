<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let _ac=null;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(freq,type,vol,atk,dec){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;
  const t=c.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.exponentialRampToValueAtTime(0.001,t+atk+dec);o.start(t);o.stop(t+atk+dec+0.05);}catch(e){}
}
function piano(midi,vol=0.15,delay=0){
  try{const c=ac(),f=440*Math.pow(2,(midi-69)/12),t=c.currentTime+delay;
  [[1,1],[2,0.5],[3,0.25],[4,0.12],[6,0.05]].forEach(([h,hv])=>{
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=f*h;g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol*hv,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
    o.start(t);o.stop(t+1.3);});}catch(e){}
}
const sfxClick=()=>tone(800,'sine',0.05,0.005,0.07);
const sfxOk=()=>{tone(523,'sine',0.13,0.01,0.2);setTimeout(()=>tone(659,'sine',0.13,0.01,0.2),80);setTimeout(()=>tone(784,'sine',0.13,0.01,0.28),160);};
const sfxFail=()=>{tone(220,'sawtooth',0.1,0.01,0.28);setTimeout(()=>tone(196,'sawtooth',0.08,0.01,0.22),120);};
const sfxWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.15,0.01,0.25),i*100));
function playChord(midis){midis.forEach((m,i)=>piano(m,0.14,i*0.02));}

// ══════════════════════════════════════════
// MUSIC THEORY
// ══════════════════════════════════════════
const ROOT_MIDI={'C':60,'C#':61,'D':62,'D#':63,'E':64,'F':65,'F#':66,'G':67,'G#':68,'A':69,'A#':70,'B':71};
const ROOT_NAMES=Object.keys(ROOT_MIDI);
const NOTES=['C','D','E','F','G','A','B'];
const ALL_NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DIA_SEMI=[0,2,4,5,7,9,11];
const NAME_TO_DIA={C:0,D:1,E:2,F:3,G:4,A:5,B:6};

const CHORDS={
  'M':     {iv:[0,4,7],   ds:[0,2,4],        disp:r=>r},
  'm':     {iv:[0,3,7],   ds:[0,2,4],        disp:r=>r+'m'},
  '+':     {iv:[0,4,8],   ds:[0,2,4],        disp:r=>r+'+'},
  'o':     {iv:[0,3,6],   ds:[0,2,4],        disp:r=>r+'°'},
  'sus4':  {iv:[0,5,7],   ds:[0,3,4],        disp:r=>r+'sus4'},
  'sus2':  {iv:[0,2,7],   ds:[0,1,4],        disp:r=>r+'sus2'},
  '6':     {iv:[0,4,7,9], ds:[0,2,4,5],      disp:r=>r+'6'},
  'm6':    {iv:[0,3,7,9], ds:[0,2,4,5],      disp:r=>r+'m6'},
  '7':     {iv:[0,4,7,10],ds:[0,2,4,6],      disp:r=>r+'7'},
  'M7':    {iv:[0,4,7,11],ds:[0,2,4,6],      disp:r=>r+'△7'},
  'm7':    {iv:[0,3,7,10],ds:[0,2,4,6],      disp:r=>r+'m7'},
  'mM7':   {iv:[0,3,7,11],ds:[0,2,4,6],      disp:r=>r+'m△7'},
  'o7':    {iv:[0,3,6,9], ds:[0,2,4,6],      disp:r=>r+'°7'},
  'ø7':    {iv:[0,3,6,10],ds:[0,2,4,6],      disp:r=>r+'ø7'},
  '+7':    {iv:[0,4,8,10],ds:[0,2,4,6],      disp:r=>r+'+7'},
  '+M7':   {iv:[0,4,8,11],ds:[0,2,4,6],      disp:r=>r+'+△7'},
  'add9':  {iv:[0,4,7,14],ds:[0,2,4,9],      disp:r=>r+'add9'},
  'madd9': {iv:[0,3,7,14],ds:[0,2,4,9],      disp:r=>r+'madd9'},
  '9':     {iv:[0,4,7,10,14],ds:[0,2,4,6,9], disp:r=>r+'9'},
  'M9':    {iv:[0,4,7,11,14],ds:[0,2,4,6,9], disp:r=>r+'△9'},
  'm9':    {iv:[0,3,7,10,14],ds:[0,2,4,6,9], disp:r=>r+'m9'},
  '13':    {iv:[0,4,7,10,14,21],ds:[0,2,4,6,9,12],disp:r=>r+'13'},
  'm13':   {iv:[0,3,7,10,14,21],ds:[0,2,4,6,9,12],disp:r=>r+'m13'},
};

// Level pools
const LV_POOL={
  '1':['M','m'],
  '2':['M','m','+','o','sus4','6','m6','7','M7','m7','mM7','o7','ø7'],
  '3':['M','m','+','o','sus4','6','m6','7','M7','m7','mM7','o7','ø7'],
  'mix':['M','m','+','o','sus4','6','m6','7','M7','m7','mM7','o7','ø7'],
  'extraA':['sus2','add9','madd9','9','M9','m9'],
  'extraB':['+7','+M7','13','m13'],
};

// Generate staff notes for a chord
function genNotes(rootKey,cid){
  const ch=CHORDS[cid],rootMidi=ROOT_MIDI[rootKey],rootDia=NAME_TO_DIA[rootKey[0]];
  const displayCount=Math.min(4,ch.ds.length);
  return ch.ds.slice(0,displayCount).map((dStep,i)=>{
    const semi=ch.iv[i],midi=rootMidi+semi;
    const targetDia=(rootDia+dStep)%7,diaOct=Math.floor((rootDia+dStep)/7);
    const rootOct=Math.floor(rootMidi/12)-1,tOct=rootOct+diaOct;
    const natMidi=(tOct+1)*12+DIA_SEMI[targetDia],diff=midi-natMidi;
    let acc='';
    if(diff===1)acc='#';else if(diff===-1)acc='b';
    else if(diff===2)acc='x';else if(diff===-2)acc='bb';
    return {midi,slot:(tOct-4)*7+(targetDia-2),acc};
  });
}

// Get all midi notes for playback
function allMidi(rootKey,cid){
  return CHORDS[cid].iv.map(i=>ROOT_MIDI[rootKey]+i);
}

// Get note names for display (e.g. "C  E  G")
function chordNoteNames(rootKey,cid){
  const rootMidi=ROOT_MIDI[rootKey];
  return CHORDS[cid].iv.slice(0,4).map(i=>{
    const midi=rootMidi+i,pc=midi%12;
    return ALL_NOTES[pc];
  });
}

// ── Staff drawing ──
function dblSharp(cx,cy,k){const s=5;return `<line x1="${cx-s}" y1="${cy-s}" x2="${cx+s}" y2="${cy+s}" stroke="${k}" stroke-width="2.2" stroke-linecap="round"/><line x1="${cx+s}" y1="${cy-s}" x2="${cx-s}" y2="${cy+s}" stroke="${k}" stroke-width="2.2" stroke-linecap="round"/>`;}

function drawStaff(notes,container,hilite=[]){
  const W=300,H=10,BY=112,SL=[0,2,4,6,8],sy=s=>BY-s*H;
  const ink='#1a1a1a',bg='#fff',RX=10,RY=7.5,NX=195,AX=NX-RX-14;
  const sorted=[...notes].sort((a,b)=>a.slot-b.slot);
  const pos=sorted.map((n,i)=>({...n,nx:i>0&&Math.abs(n.slot-sorted[i-1].slot)===1?NX+RX*2+2:NX}));
  const ledge=new Set();
  sorted.forEach(n=>{
    if(n.slot<=-2)for(let s=-2;s>=n.slot;s-=2)ledge.add(s);
    if(n.slot>=10)for(let s=10;s<=n.slot;s+=2)ledge.add(s);
  });
  let svg=`<svg viewBox="0 0 ${W} 150" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;">`;
  svg+=`<rect width="${W}" height="150" fill="transparent"/>`;
  SL.forEach(s=>{const y=sy(s);svg+=`<line x1="30" y1="${y}" x2="${W-8}" y2="${y}" stroke="${ink}" stroke-width="1" opacity="0.6"/>`;});
  svg+=`<text x="10" y="${sy(0)+16}" font-size="100" fill="${ink}" font-family="serif" dominant-baseline="auto" opacity="0.8">𝄞</text>`;
  ledge.forEach(s=>{
    const y=sy(s),mx=Math.max(NX,...pos.filter(n=>Math.abs(n.slot-s)<=1).map(n=>n.nx));
    svg+=`<line x1="${NX-RX-5}" y1="${y}" x2="${mx+RX+5}" y2="${y}" stroke="${ink}" stroke-width="1"/>`;
  });
  pos.forEach(n=>{
    const y=sy(n.slot),nx=n.nx,hi=hilite.includes(n.midi),nc=hi?'#7C3AED':ink;
    if(n.acc==='#')svg+=`<text x="${AX}" y="${y+5}" font-size="15" fill="${nc}" text-anchor="middle" font-family="serif">♯</text>`;
    else if(n.acc==='b')svg+=`<text x="${AX}" y="${y+7}" font-size="17" fill="${nc}" text-anchor="middle" font-family="serif">♭</text>`;
    else if(n.acc==='x')svg+=dblSharp(AX,y,nc);
    else if(n.acc==='bb')svg+=`<text x="${AX-2}" y="${y+7}" font-size="14" fill="${nc}" text-anchor="middle" font-family="serif">𝄫</text>`;
    svg+=`<ellipse cx="${nx}" cy="${y}" rx="${RX}" ry="${RY}" fill="${nc}" transform="rotate(-10,${nx},${y})"/>`;
    svg+=`<ellipse cx="${nx}" cy="${y}" rx="${RX*0.42}" ry="${RY*0.55}" fill="${bg}" transform="rotate(-10,${nx},${y})"/>`;
  });
  svg+='</svg>';
  container.innerHTML=svg;
}

// ── Game B: auto-assign octave ──
// Given a root (midi 60-71) and a note name pressed,
// find the midi that is >= rootMidi and closest above (within one octave up)
function autoOctaveMidi(rootMidi, notePc){
  // notePc: 0-11
  const rootPc=rootMidi%12;
  let offset=notePc-rootPc;
  if(offset<0)offset+=12;
  // if offset==0 that's the root itself
  return rootMidi+offset;
}

// Convert entered note pcs back to display names
function pcToName(pc){return ALL_NOTES[((pc%12)+12)%12];}

// Build staff notes from entered pcs, auto-assigned octave above root
function bStaffNotes(rootMidi, enteredPcs){
  return enteredPcs.map(pc=>{
    const midi=autoOctaveMidi(rootMidi,pc);
    // staff position
    const sharpMap=[
      {slot:-2,acc:''},{slot:-2,acc:'#'},{slot:-1,acc:''},{slot:-1,acc:'#'},
      {slot:0,acc:''},{slot:1,acc:''},{slot:1,acc:'#'},{slot:2,acc:''},
      {slot:2,acc:'#'},{slot:3,acc:''},{slot:3,acc:'#'},{slot:4,acc:''},
    ];
    const note=sharpMap[pc];
    // adjust slot for octave (if midi >= 72, slot += 7)
    const octShift=Math.floor((midi-60)/12);
    return {midi,slot:note.slot+octShift*7,acc:note.acc};
  });
}

// ══════════════════════════════════════════
// POOL BUILDER
// ══════════════════════════════════════════
function buildPool(levelKey,extraA,extraB){
  let pool=[...LV_POOL[levelKey]];
  if(extraA)pool=[...new Set([...pool,...LV_POOL.extraA])];
  if(extraB)pool=[...new Set([...pool,...LV_POOL.extraB])];
  const combos=[];
  ROOT_NAMES.forEach(r=>pool.forEach(c=>combos.push({r,c})));
  for(let i=combos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[combos[i],combos[j]]=[combos[j],combos[i]];}
  return combos.slice(0,10).map(({r,c})=>({
    root:r,cid:c,
    notes:genNotes(r,c),
    midis:allMidi(r,c),
    noteNames:chordNoteNames(r,c),
    display:CHORDS[c].disp(r),
  }));
}

// ══════════════════════════════════════════
// PERSIST
// ══════════════════════════════════════════
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function loadSave(){try{const r=localStorage.getItem('chord_v4');if(!r)return null;const d=JSON.parse(r);if(d.day!==todayKey())return null;return d;}catch(e){return null;}}
function persist(){try{localStorage.setItem('chord_v4',JSON.stringify({day:todayKey(),extraA:S.extraA,extraB:S.extraB}));}catch(e){}}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const sv=loadSave();
let S={
  screen:'home',
  game:'A',levelKey:'1',
  extraA:sv?sv.extraA:false,
  extraB:sv?sv.extraB:false,
  pool:[],qIdx:0,correct:0,submitted:false,history:[],
  // Game A
  ansRoot:'',ansAcc:'',ansQuality:'',ansExt:'',ansMaj:false,
  // Game B: array of pc (0-11), no duplicates
  bPcs:[],
};

// ══════════════════════════════════════════
// GAME A LOGIC
// ══════════════════════════════════════════
function aDisp(){
  const{ansRoot:r,ansAcc:ac,ansQuality:q,ansMaj:maj,ansExt:ext}=S;
  if(!r)return '';
  let s=r+ac;
  if(q)s+=q==='o'?'°':q==='ø'?'ø':q;
  if(maj)s+='△';
  if(ext)s+=ext;
  return s;
}
function aCid(){
  const{ansQuality:q,ansMaj:maj,ansExt:ext}=S;
  if(!q&&!ext&&!maj)return 'M';
  if(q==='sus4'&&!ext)return 'sus4';
  if(q==='sus2'&&!ext)return 'sus2';
  let key=q==='o'?'o':q==='ø'?'ø':q==='+' ?'+':q==='m'?'m':'';
  if(!ext)return key||'M';
  const M=maj?'M':'';
  if(ext==='6'){if(key==='m')return 'm6';return '6';}
  if(ext==='7'){
    if(key==='o')return 'o7';if(key==='ø')return 'ø7';
    if(key==='+')return M?'+M7':'+7';
    if(key==='m')return M?'mM7':'m7';
    return M?'M7':'7';
  }
  if(ext==='9'){if(key==='m')return 'm9';return M?'M9':'9';}
  if(ext==='add9'){if(key==='m')return 'madd9';return 'add9';}
  if(ext==='13'){if(key==='m')return 'm13';return '13';}
  return 'M';
}
function aCanSub(){return !S.submitted&&S.ansRoot!=='';}
function aOk(){
  const q=S.pool[S.qIdx],uRoot=S.ansRoot+S.ansAcc;
  const eh={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb','Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
  const rOk=uRoot===q.root||eh[uRoot]===q.root||uRoot===eh[q.root];
  return rOk&&aCid()===q.cid;
}

// ══════════════════════════════════════════
// GAME B LOGIC
// ══════════════════════════════════════════
function bOk(){
  const q=S.pool[S.qIdx];
  const exp=new Set(q.midis.map(m=>((m-60)%12+12)%12));
  const got=new Set(S.bPcs);
  if(exp.size!==got.size)return false;
  for(const v of exp)if(!got.has(v))return false;
  return true;
}
function bCanSub(){return !S.submitted&&S.bPcs.length>0;}

// ══════════════════════════════════════════
// RENDER ROUTER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById('app'),s=S.screen;
  if(s==='home')return rHome(app);
  if(s==='levelA'||s==='levelB')return rLevel(app);
  if(s==='gameA'){if(!document.getElementById('GR'))rGameA(app);else uGameA();return;}
  if(s==='gameB'){if(!document.getElementById('GR'))rGameB(app);else uGameB();return;}
  if(s==='sum')return rSum(app);
}

// ══════════════════════════════════════════
// HOME
// ══════════════════════════════════════════

          <div class="toggle-switch${S.extraA?' on':''}" id="sw-a"><div class="toggle-knob"></div></div>

function toggleExtra(which){
  sfxClick();
  if(which==='A')S.extraA=!S.extraA;
  else S.extraB=!S.extraB;
  persist();
  const sw=document.getElementById('sw-'+which.toLowerCase());
  if(sw)sw.className='toggle-switch'+(which==='A'?S.extraA:S.extraB?' on':'');
}

// ══════════════════════════════════════════
// LEVEL SELECT
// ══════════════════════════════════════════
function goLevel(game){sfxClick();S.game=game;S.screen='level'+game;render();}
function goHome(){sfxClick();S.screen='home';render();}

function rLevel(app){
  const isA=S.game==='A';
  const now=new Date(),nm=new Date(now);nm.setHours(24,0,0,0);
  const diff=nm-now,hh=Math.floor(diff/3600000),mm=Math.floor((diff%3600000)/60000);
  const lvs=[
    {key:'1',label:'Level 1',desc:'大三、小三'},
    {key:'2',label:'Level 2',desc:'累積 LV1 ＋ 增、減、sus4、六、小六、七和弦、m△7'},
    {key:'3',label:'Level 3',desc:'同 LV2 範圍（全混合練習）'},
    {key:'mix',label:'⚡ 混合關',desc:'全部和弦大混合 🎲'},
  ];
  app.innerHTML=`<div class="level-screen">
    <div style="display:flex;align-items:center;gap:10px;padding:0 4px;margin-bottom:4px">
      <span style="cursor:pointer;font-size:13px;color:#888" onclick="goHome()">← 返回</span>
      <span style="font-size:16px;font-weight:700;color:#1a1a1a">${isA?'🎼 遊戲 A':'🎹 遊戲 B'}｜選擇關卡</span>
    </div>
    ${S.extraA||S.extraB?`<div style="font-size:11px;color:#D97706;padding:6px 10px;background:#FEF3C7;border-radius:8px">⚡ 額外難度已開啟，將融入出題</div>`:''}
    <div class="lv-cards">
      ${lvs.map(lv=>{
        const isMix=lv.key==='mix';
        return `<div class="lv-card${isMix?(isA?' mix-a':' mix-b'):''}" onclick="startGame('${lv.key}')">
          <div class="lv-card-title">${lv.label}</div>
          <div class="lv-card-desc">${lv.desc}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="reset-note">闖關紀錄將在 00:00 重置（距離 ${hh}h ${mm}m）</div>
  </div>`;
}

function startGame(lvKey){
  sfxClick();
  S={...S,levelKey:lvKey,
    pool:buildPool(lvKey,S.extraA,S.extraB),
    qIdx:0,correct:0,submitted:false,history:[],
    ansRoot:'',ansAcc:'',ansQuality:'',ansExt:'',ansMaj:false,
    bPcs:[],
    screen:'game'+S.game,
  };
  const app=document.getElementById('app');
  S.game==='A'?rGameA(app):rGameB(app);
}

function lvLabel(){
  return S.levelKey==='mix'?'混合關':'Level '+S.levelKey;
}

// ══════════════════════════════════════════
// GAME A
// ══════════════════════════════════════════
function rGameA(app){
  const q=S.pool[S.qIdx];
  app.innerHTML=`<div id="GR" style="display:flex;flex-direction:column;gap:8px">
  <div class="hdr">
    <span class="lv-badge">${lvLabel()}</span>
    <span class="hdr-mid" id="HP">第 ${S.qIdx+1} / 10 題</span>
    <span class="hdr-score" id="HS">✓ ${S.correct}</span>
  </div>
  <span class="hdr-back" onclick="goLevel('A')">← 返回選關</span>
  <div class="staff-card"><div class="q-label">辨識下列和弦</div><div id="STF"></div></div>
  <div class="answer-box" id="AB">
    <div><div class="answer-text" id="AT">─</div><div id="AH" style="font-size:11px;color:#bbb">作答區</div></div>
    <div id="AI" style="font-size:22px"></div>
  </div>
  <div class="kbd">
    <div class="kbd-section"><div class="kbd-label">根音</div>
      <div class="kbd-row">${NOTES.map(n=>`<div class="key" id="KR${n}" onclick="aRoot('${n}')">${n}</div>`).join('')}</div>
    </div>
    <div class="kbd-section"><div class="kbd-label">升降記號</div>
      <div class="kbd-row">
        <div class="key" id="KAS" onclick="aAcc('#')" style="flex:1">♯ 升</div>
        <div class="key" id="KAF" onclick="aAcc('b')" style="flex:1">♭ 降</div>
      </div>
    </div>
    <div class="kbd-section"><div class="kbd-label">和弦質地（互斥）</div>
      <div class="kbd-row">
        ${['m','+','o','ø','sus4'].map(k=>`<div class="key" id="KQ${k}" onclick="aQual('${k}')">${k==='o'?'°':k==='ø'?'ø':k}</div>`).join('')}
      </div>
    </div>
    <div class="kbd-section"><div class="kbd-label">延伸音</div>
      <div class="kbd-row">
        ${['△','6','7','9','add9','13'].map(k=>`<div class="key" id="KE${k}" onclick="aExt('${k}')">${k}</div>`).join('')}
      </div>
    </div>
    <div class="kbd-row" style="margin-top:2px">
      <div class="key" style="max-width:120px" onclick="aClr()">⌫ 清除</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn primary" id="BS" onclick="aSub()" disabled>送出</button>
    <button class="btn next-btn" id="BN" onclick="aNext()" disabled>下一題 →</button>
  </div></div>`;
  setTimeout(()=>{const e=document.getElementById('STF');if(e&&q)drawStaff(q.notes,e);},10);
}

function uGameA(){
  const q=S.pool[S.qIdx],ok=S.submitted&&aOk(),bad=S.submitted&&!ok;
  const ab=document.getElementById('AB');if(ab)ab.className='answer-box'+(S.submitted?(ok?' correct':' wrong'):'');
  const at=document.getElementById('AT');if(at)at.textContent=aDisp()||'─';
  const ah=document.getElementById('AH');
  if(ah){ah.style.color=bad?'#A32D2D':'#bbb';ah.textContent=bad?`正確：${q.display}`:'作答區';}
  const ai=document.getElementById('AI');if(ai)ai.textContent=S.submitted?(ok?'✅':'❌'):'';
  const hp=document.getElementById('HP');if(hp)hp.textContent=`第 ${S.qIdx+1} / 10 題`;
  const hs=document.getElementById('HS');if(hs)hs.textContent=`✓ ${S.correct}`;
  NOTES.forEach(n=>{const e=document.getElementById('KR'+n);if(e)e.className='key'+(S.ansRoot===n?' active':'');});
  const ks=document.getElementById('KAS');if(ks)ks.className='key'+(S.ansAcc==='#'?' active':'');
  const kf=document.getElementById('KAF');if(kf)kf.className='key'+(S.ansAcc==='b'?' active':'');
  ['m','+','o','ø','sus4'].forEach(k=>{const e=document.getElementById('KQ'+k);if(e)e.className='key'+(S.ansQuality===k?' active':'');});
  ['△','6','7','9','add9','13'].forEach(k=>{const e=document.getElementById('KE'+k);if(e)e.className='key'+((k==='△'&&S.ansMaj)||(k!=='△'&&S.ansExt===k)?' active':'');});
  const bs=document.getElementById('BS');if(bs)bs.disabled=!aCanSub();
  const bn=document.getElementById('BN');if(bn)bn.disabled=!S.submitted;
}

function aRoot(r){if(S.submitted)return;sfxClick();S.ansRoot=r;uGameA();}
function aAcc(a){if(S.submitted)return;sfxClick();S.ansAcc=S.ansAcc===a?'':a;uGameA();}
function aQual(q){if(S.submitted)return;sfxClick();S.ansQuality=S.ansQuality===q?'':q;uGameA();}
function aExt(e){if(S.submitted)return;sfxClick();if(e==='△')S.ansMaj=!S.ansMaj;else S.ansExt=S.ansExt===e?'':e;uGameA();}
function aClr(){if(S.submitted)return;sfxClick();S.ansRoot='';S.ansAcc='';S.ansQuality='';S.ansExt='';S.ansMaj=false;uGameA();}

function aSub(){
  if(!aCanSub())return;
  S.submitted=true;const ok=aOk();
  if(ok){S.correct++;sfxOk();}else sfxFail();
  const q=S.pool[S.qIdx];
  setTimeout(()=>playChord(q.midis),ok?300:200);
  S.history.push({q,user:aDisp()||S.ansRoot,ok});
  uGameA();
}
function aNext(){
  if(S.qIdx>=9){S.screen='sum';render();return;}
  sfxClick();S.qIdx++;S.submitted=false;
  S.ansRoot='';S.ansAcc='';S.ansQuality='';S.ansExt='';S.ansMaj=false;
  uGameA();
  setTimeout(()=>{const e=document.getElementById('STF');if(e)drawStaff(S.pool[S.qIdx].notes,e);},10);
}

// ══════════════════════════════════════════
// GAME B
// ══════════════════════════════════════════
function rGameB(app){
  const q=S.pool[S.qIdx];
  app.innerHTML=`<div id="GR" style="display:flex;flex-direction:column;gap:8px">
  <div class="hdr">
    <span class="lv-badge b">${lvLabel()}</span>
    <span class="hdr-mid" id="HP">第 ${S.qIdx+1} / 10 題</span>
    <span class="hdr-score" id="HS">✓ ${S.correct}</span>
  </div>
  <span class="hdr-back" onclick="goLevel('B')">← 返回選關</span>
  <div class="staff-card">
    <div id="BCN" style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px">${q?q.display:''}</div>
    <div class="q-label">按出所有組成音符</div>
    <div id="STF"></div>
  </div>
  <div class="answer-box" id="AB">
    <div><div class="answer-text" id="AT" style="font-size:18px">─</div><div id="AH" style="font-size:11px;color:#bbb">作答區</div></div>
    <div id="AI" style="font-size:22px"></div>
  </div>
  <div class="kbd">
    <div class="kbd-section"><div class="kbd-label">音符（再按一次 = 刪除）</div>
      <div class="kbd-row">${ALL_NOTES.slice(0,7).map(n=>`<div class="key" id="BK${n.replace('#','s')}" onclick="bNote(${ALL_NOTES.indexOf(n)})">${n}</div>`).join('')}</div>
      <div class="kbd-row" style="margin-top:5px">
        ${ALL_NOTES.slice(7).map(n=>`<div class="key" id="BK${n.replace('#','s')}" onclick="bNote(${ALL_NOTES.indexOf(n)})">${n}</div>`).join('')}
        <div class="key" style="background:#f0f0ec;max-width:60px" onclick="bClr()">清除</div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn primary b" id="BS" onclick="bSub()" disabled>送出</button>
    <button class="btn next-btn" id="BN" onclick="bNext()" disabled>下一題 →</button>
  </div></div>`;
  setTimeout(()=>{const e=document.getElementById('STF');if(e)drawStaff([],e);},10);
}

function uGameB(){
  const q=S.pool[S.qIdx];
  const ok=S.submitted&&bOk(),bad=S.submitted&&!ok;
  const ab=document.getElementById('AB');if(ab)ab.className='answer-box'+(S.submitted?(ok?' correct':' wrong'):'');
  // Answer text: show entered note names
  const names=S.bPcs.map(pc=>ALL_NOTES[pc]);
  const at=document.getElementById('AT');if(at)at.textContent=names.join('  ')||'─';
  const ah=document.getElementById('AH');
  if(ah){
    ah.style.color=bad?'#A32D2D':'#bbb';
    // Show correct note names, not chord symbol
    ah.textContent=bad?`正確：${q.noteNames.join('  ')}`:'作答區';
  }
  const ai=document.getElementById('AI');if(ai)ai.textContent=S.submitted?(ok?'✅':'❌'):'';
  const hp=document.getElementById('HP');if(hp)hp.textContent=`第 ${S.qIdx+1} / 10 題`;
  const hs=document.getElementById('HS');if(hs)hs.textContent=`✓ ${S.correct}`;
  // Key highlights
  ALL_NOTES.forEach((n,pc)=>{
    const e=document.getElementById('BK'+n.replace('#','s'));
    if(e)e.className='key'+(S.bPcs.includes(pc)?' active b':'');
  });
  // Staff: draw entered notes with auto octave
  const rootMidi=ROOT_MIDI[q.root];
  const staffNotes=bStaffNotes(rootMidi,S.bPcs);
  const el=document.getElementById('STF');
  if(el)drawStaff(staffNotes,el,staffNotes.map(n=>n.midi));
  const bs=document.getElementById('BS');if(bs)bs.disabled=!bCanSub();
  const bn=document.getElementById('BN');if(bn)bn.disabled=!S.submitted;
}

function bNote(pc){
  if(S.submitted)return;
  sfxClick();
  const idx=S.bPcs.indexOf(pc);
  if(idx>=0){S.bPcs.splice(idx,1);}
  else{
    S.bPcs.push(pc);
    const q=S.pool[S.qIdx];
    piano(autoOctaveMidi(ROOT_MIDI[q.root],pc),0.15);
  }
  uGameB();
}
function bClr(){if(S.submitted)return;sfxClick();S.bPcs=[];uGameB();}

function bSub(){
  if(!bCanSub())return;
  S.submitted=true;const ok=bOk();
  if(ok){S.correct++;sfxOk();}else sfxFail();
  const q=S.pool[S.qIdx];
  setTimeout(()=>playChord(q.midis),ok?300:200);
  const names=S.bPcs.map(pc=>ALL_NOTES[pc]);
  S.history.push({q,user:names.join(' '),ok});
  uGameB();
}
function bNext(){
  if(S.qIdx>=9){S.screen='sum';render();return;}
  sfxClick();S.qIdx++;S.submitted=false;S.bPcs=[];
  uGameB();
  const cn=document.getElementById('BCN');if(cn)cn.textContent=S.pool[S.qIdx].display;
  setTimeout(()=>{const e=document.getElementById('STF');if(e)drawStaff([],e);},10);
}

// ══════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════
function rSum(app){
  const isA=S.game==='A';
  const pct=Math.round(S.correct/10*100),passed=pct>=90;
  if(passed)setTimeout(sfxWin,200);
  app.innerHTML=`<div class="summary">
    <div style="font-size:16px;font-weight:700;color:#1a1a1a">${isA?'🎼':'🎹'} ${lvLabel()} 結果</div>
    <div class="sum-stats">
      <div class="stat-box"><div class="stat-num">${S.correct}</div><div class="stat-lbl">答對</div></div>
      <div class="stat-box"><div class="stat-num">${10-S.correct}</div><div class="stat-lbl">答錯</div></div>
      <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">正確率</div></div>
    </div>
    <div class="pass-msg ${passed?'pass':'fail'}">${passed?'🎉 通過！':'😅 再加油！需達 90% 才晉級'}</div>
    <div class="sum-list">${(S.history||[]).map((h,i)=>`
      <div class="sum-item ${h.ok?'ok':'bad'}">
        <div style="font-size:14px;flex-shrink:0">${h.ok?'✅':'❌'}</div>
        <div>
          <div style="font-size:11px;color:#999">題 ${i+1}｜${h.q.display}</div>
          <div style="font-weight:600;font-size:13px;color:#1a1a1a">${h.user}${!h.ok?'　→　正確：'+h.q.noteNames.join('  '):''}</div>
        </div>
      </div>`).join('')}
    </div>
    <button class="btn-full${isA?'':' b'}" onclick="goLevel('${S.game}')">返回選關</button>
    <button class="btn-sec" onclick="startGame('${S.levelKey}')">再練一次</button>
    <button class="btn-sec" onclick="goHome()">回首頁</button>
  </div>`;
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
render();
if('serviceWorker' in navigator){
  const sw=`const C='cv5';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
