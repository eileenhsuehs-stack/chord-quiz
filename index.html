<div id="app"></div>
<script>
// ══════════════════════════════════════════
// AUDIO — with iOS resume on visibility
// ══════════════════════════════════════════
let _ac=null;
function ac(){
  if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended')_ac.resume();
  return _ac;
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&_ac&&_ac.state==='suspended')_ac.resume();});
document.addEventListener('touchstart',()=>{if(_ac&&_ac.state==='suspended')_ac.resume();},{once:false,passive:true});

function tone(freq,type,vol,atk,dec){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;
  const t=c.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.exponentialRampToValueAtTime(0.001,t+atk+dec);o.start(t);o.stop(t+atk+dec+0.05);}catch(e){}
}
function piano(midi,vol=0.15,delay=0){
  try{const c=ac(),f=440*Math.pow(2,(midi-69)/12),t=c.currentTime+delay;
  [[1,1],[2,0.5],[3,0.25],[4,0.12],[6,0.05]].forEach(([h,hv])=>{
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=f*h;g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol*hv,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
    o.start(t);o.stop(t+1.3);});}catch(e){}
}
const sfxClick=()=>tone(800,'sine',0.05,0.005,0.07);
const sfxOk=()=>{tone(523,'sine',0.13,0.01,0.2);setTimeout(()=>tone(659,'sine',0.13,0.01,0.2),80);setTimeout(()=>tone(784,'sine',0.13,0.01,0.28),160);};
const sfxFail=()=>{tone(220,'sawtooth',0.1,0.01,0.28);setTimeout(()=>tone(196,'sawtooth',0.08,0.01,0.22),120);};
const sfxWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.15,0.01,0.25),i*100));
// Chord plays 800ms after result sound
function playChord(midis,ok){setTimeout(()=>midis.forEach((m,i)=>piano(m,0.14,i*0.03)),800);}

// ══════════════════════════════════════════
// MUSIC THEORY
// ══════════════════════════════════════════
// All roots including flats
const ROOT_MIDI_MAP={
  'C':60,'C#':61,'Db':61,'D':62,'D#':63,'Eb':63,
  'E':64,'F':65,'F#':66,'Gb':66,'G':67,'G#':68,
  'Ab':68,'A':69,'A#':70,'Bb':70,'B':71
};
// Root names for pool — include both sharps and flats for black keys
const ROOT_NAMES=[
  'C','C#','Db','D','D#','Eb','E','F',
  'F#','Gb','G','G#','Ab','A','A#','Bb','B'
];
const NOTES=['C','D','E','F','G','A','B'];
const ALL_NOTES_SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DIA_SEMI=[0,2,4,5,7,9,11];
const NAME_TO_DIA={C:0,D:1,E:2,F:3,G:4,A:5,B:6};

// Parse root key into name+accSemi
function parseRoot(rk){
  const name=rk[0];
  const acc=rk.slice(1);
  const accSemi=acc==='#'?1:acc==='b'?-1:acc==='##'?2:acc==='bb'?-2:0;
  return {name,dia:NAME_TO_DIA[name],accSemi};
}

const CHORDS={
  'M':    {iv:[0,4,7],   ds:[0,2,4],        disp:r=>r},
  'm':    {iv:[0,3,7],   ds:[0,2,4],        disp:r=>r+'m'},
  '+':    {iv:[0,4,8],   ds:[0,2,4],        disp:r=>r+'+'},
  'o':    {iv:[0,3,6],   ds:[0,2,4],        disp:r=>r+'°'},
  'sus4': {iv:[0,5,7],   ds:[0,3,4],        disp:r=>r+'sus4'},
  'sus2': {iv:[0,2,7],   ds:[0,1,4],        disp:r=>r+'sus2'},
  '6':    {iv:[0,4,7,9], ds:[0,2,4,5],      disp:r=>r+'6'},
  'm6':   {iv:[0,3,7,9], ds:[0,2,4,5],      disp:r=>r+'m6'},
  '7':    {iv:[0,4,7,10],ds:[0,2,4,6],      disp:r=>r+'7'},
  'M7':   {iv:[0,4,7,11],ds:[0,2,4,6],      disp:r=>r+'△7'},
  'm7':   {iv:[0,3,7,10],ds:[0,2,4,6],      disp:r=>r+'m7'},
  'mM7':  {iv:[0,3,7,11],ds:[0,2,4,6],      disp:r=>r+'m△7'},
  'o7':   {iv:[0,3,6,9], ds:[0,2,4,6],      disp:r=>r+'°7'},
  'ø7':   {iv:[0,3,6,10],ds:[0,2,4,6],      disp:r=>r+'ø7'},
  '+7':   {iv:[0,4,8,10],ds:[0,2,4,6],      disp:r=>r+'+7'},
  '+M7':  {iv:[0,4,8,11],ds:[0,2,4,6],      disp:r=>r+'+△7'},
  'add9': {iv:[0,4,7,14],ds:[0,2,4,9],      disp:r=>r+'add9'},
  'madd9':{iv:[0,3,7,14],ds:[0,2,4,9],      disp:r=>r+'madd9'},
  '9':    {iv:[0,4,7,10,14],ds:[0,2,4,6,9], disp:r=>r+'9'},
  'M9':   {iv:[0,4,7,11,14],ds:[0,2,4,6,9], disp:r=>r+'△9'},
  'm9':   {iv:[0,3,7,10,14],ds:[0,2,4,6,9], disp:r=>r+'m9'},
  '13':   {iv:[0,4,7,10,14,21],ds:[0,2,4,6,9,12],disp:r=>r+'13'},
  'm13':  {iv:[0,3,7,10,14,21],ds:[0,2,4,6,9,12],disp:r=>r+'m13'},
};

const LV_POOL={
  '1':['M','m','sus4'],
  '2':['M','m','sus4','+','o','M7','m7','mM7','7'],
  '3':['M','m','sus4','+','o','M7','m7','mM7','7','6','m6','ø7','o7'],
  'mix':['M','m','sus4','+','o','M7','m7','mM7','7','6','m6','ø7','o7'],
  'extraA':['add9','madd9','9','M9','m9'],
  'extraB':['+7','+M7','13','m13'],
};

// Check if a chord combination produces double accidentals
function hasDoubleAcc(rootKey,cid){
  const ch=CHORDS[cid];
  if(!ch)return false;
  const {name:rootName,dia:rootDia}=parseRoot(rootKey);
  const rootMidi=ROOT_MIDI_MAP[rootKey];
  return ch.ds.slice(0,4).some((dStep,i)=>{
    const semi=ch.iv[i],midi=rootMidi+semi;
    const targetDia=(rootDia+dStep)%7;
    const diaOct=Math.floor((rootDia+dStep)/7);
    const rootOct=Math.floor(rootMidi/12)-1;
    const tOct=rootOct+diaOct;
    const natMidi=(tOct+1)*12+DIA_SEMI[targetDia];
    return Math.abs(midi-natMidi)>=2;
  });
}

// Generate staff display notes for a chord
function genNotes(rootKey,cid){
  const ch=CHORDS[cid];
  const {name:rootName,dia:rootDia}=parseRoot(rootKey);
  const rootMidi=ROOT_MIDI_MAP[rootKey];
  const displayCount=Math.min(4,ch.ds.length);
  return ch.ds.slice(0,displayCount).map((dStep,i)=>{
    const semi=ch.iv[i],midi=rootMidi+semi;
    const targetDia=(rootDia+dStep)%7;
    const diaOct=Math.floor((rootDia+dStep)/7);
    const rootOct=Math.floor(rootMidi/12)-1;
    const tOct=rootOct+diaOct;
    const natMidi=(tOct+1)*12+DIA_SEMI[targetDia];
    const diff=midi-natMidi;
    let acc='';
    if(diff===1)acc='#';else if(diff===-1)acc='b';
    else if(diff===2)acc='x';else if(diff===-2)acc='bb';
    return {midi,slot:(tOct-4)*7+(targetDia-2),acc};
  });
}

function allMidi(rootKey,cid){
  return CHORDS[cid].iv.map(i=>ROOT_MIDI_MAP[rootKey]+i);
}

// Correct note names for a chord (for Game B display)
function chordNoteNames(rootKey,cid){
  const ch=CHORDS[cid];
  const {name:rootName,dia:rootDia}=parseRoot(rootKey);
  const rootMidi=ROOT_MIDI_MAP[rootKey];
  return ch.ds.slice(0,4).map((dStep,i)=>{
    const semi=ch.iv[i],midi=rootMidi+semi;
    const targetDia=(rootDia+dStep)%7;
    const diaOct=Math.floor((rootDia+dStep)/7);
    const rootOct=Math.floor(rootMidi/12)-1;
    const tOct=rootOct+diaOct;
    const natMidi=(tOct+1)*12+DIA_SEMI[targetDia];
    const diff=midi-natMidi;
    let noteName=NOTES[targetDia];
    if(diff===1)noteName+='#';
    else if(diff===-1)noteName+='b';
    else if(diff===2)noteName+='##';
    else if(diff===-2)noteName+='bb';
    return noteName;
  });
}

// ── Staff drawing ──
function dblSharp(cx,cy,ink){
  // Larger, bolder ×
  const s=6;
  return `<line x1="${cx-s}" y1="${cy-s}" x2="${cx+s}" y2="${cy+s}" stroke="${ink}" stroke-width="3" stroke-linecap="round"/>
<line x1="${cx+s}" y1="${cy-s}" x2="${cx-s}" y2="${cy+s}" stroke="${ink}" stroke-width="3" stroke-linecap="round"/>`;
}

function drawStaff(notes,container,hilite=[]){
  const W=300,HS=10,BY=108,SL=[0,2,4,6,8];
  const sy=s=>BY-s*HS;
  const ink='#1a1a1a',bg='#fff',RX=10,RY=7.5,NX=195,AX=NX-RX-14;
  const sorted=[...notes].sort((a,b)=>a.slot-b.slot);
  const pos=sorted.map((n,i)=>({...n,nx:i>0&&Math.abs(n.slot-sorted[i-1].slot)===1?NX+RX*2+2:NX}));
  const ledge=new Set();
  sorted.forEach(n=>{
    if(n.slot<=-2)for(let s=-2;s>=n.slot;s-=2)ledge.add(s);
    if(n.slot>=10)for(let s=10;s<=n.slot;s+=2)ledge.add(s);
  });
  let svg=`<svg viewBox="0 0 ${W} 148" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;">`;
  svg+=`<rect width="${W}" height="148" fill="transparent"/>`;
  SL.forEach(s=>{const y=sy(s);svg+=`<line x1="32" y1="${y}" x2="${W-8}" y2="${y}" stroke="${ink}" stroke-width="1" opacity="0.55"/>`;});
  // Treble clef — fixed position anchored to bottom line (slot 0 = E4)
  // Use transform to position precisely
  const clefY=sy(0); // bottom line y
  svg+=`<text x="4" y="${clefY+14}" font-size="94" fill="${ink}" font-family="serif" dominant-baseline="auto" opacity="0.82">𝄞</text>`;
  ledge.forEach(s=>{
    const y=sy(s),mx=Math.max(NX,...pos.filter(n=>Math.abs(n.slot-s)<=1).map(n=>n.nx));
    svg+=`<line x1="${NX-RX-5}" y1="${y}" x2="${mx+RX+5}" y2="${y}" stroke="${ink}" stroke-width="1"/>`;
  });
  pos.forEach(n=>{
    const y=sy(n.slot),nx=n.nx,hi=hilite.includes(n.midi),nc=hi?'#7C3AED':ink;
    if(n.acc==='#')svg+=`<text x="${AX}" y="${y+5}" font-size="15" fill="${nc}" text-anchor="middle" font-family="serif">♯</text>`;
    else if(n.acc==='b')svg+=`<text x="${AX}" y="${y+7}" font-size="17" fill="${nc}" text-anchor="middle" font-family="serif">♭</text>`;
    else if(n.acc==='x')svg+=dblSharp(AX,y,nc);
    else if(n.acc==='bb')svg+=`<text x="${AX-2}" y="${y+7}" font-size="14" fill="${nc}" text-anchor="middle" font-family="serif">𝄫</text>`;
    svg+=`<ellipse cx="${nx}" cy="${y}" rx="${RX}" ry="${RY}" fill="${nc}" transform="rotate(-10,${nx},${y})"/>`;
    svg+=`<ellipse cx="${nx}" cy="${y}" rx="${RX*0.42}" ry="${RY*0.55}" fill="${bg}" transform="rotate(-10,${nx},${y})"/>`;
  });
  svg+='</svg>';
  container.innerHTML=svg;
}

// ══════════════════════════════════════════
// GAME B — auto octave staff notes
// ══════════════════════════════════════════
// Given root midi and a note name string (e.g. 'E#','Bb'), compute midi and staff info
function noteNameToMidi(noteName){
  const base=noteName[0];
  const acc=noteName.slice(1);
  const baseMidi={C:60,D:62,E:64,F:65,G:67,A:69,B:71}[base];
  const shift=acc==='#'?1:acc==='b'?-1:acc==='##'?2:acc==='bb'?-2:0;
  return baseMidi+shift;
}

function noteNameToStaff(noteName,rootMidi){
  const base=noteName[0];
  const acc=noteName.slice(1);
  const baseDia=NAME_TO_DIA[base];
  // Find appropriate octave: note midi >= rootMidi, within 12 semitones above
  const baseMidiC4={C:60,D:62,E:64,F:65,G:67,A:69,B:71}[base];
  const shift=acc==='#'?1:acc==='b'?-1:acc==='##'?2:acc==='bb'?-2:0;
  let midi=baseMidiC4+shift;
  // Bring to same or higher octave as rootMidi
  while(midi<rootMidi)midi+=12;
  if(midi-rootMidi>12)midi-=12;
  const oct=Math.floor(midi/12)-1;
  const slot=(oct-4)*7+(baseDia-2);
  const accStr=acc==='#'?'#':acc==='b'?'b':acc==='##'?'x':acc==='bb'?'bb':'';
  return {midi,slot,acc:accStr};
}

// ══════════════════════════════════════════
// POOL BUILDER
// ══════════════════════════════════════════
function buildPool(levelKey,extraA,extraB,extraC){
  let pool=[...LV_POOL[levelKey]];
  if(extraA)pool=[...new Set([...pool,...LV_POOL.extraA])];
  if(extraB)pool=[...new Set([...pool,...LV_POOL.extraB])];
  let combos=[];
  ROOT_NAMES.forEach(r=>pool.forEach(c=>combos.push({r,c})));
  // Filter based on extraC
  if(!extraC){
    combos=combos.filter(({r,c})=>!hasDoubleAcc(r,c));
  }
  for(let i=combos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[combos[i],combos[j]]=[combos[j],combos[i]];}
  return combos.slice(0,10).map(({r,c})=>({
    root:r,cid:c,
    notes:genNotes(r,c),
    midis:allMidi(r,c),
    noteNames:chordNoteNames(r,c),
    display:CHORDS[c].disp(r),
  }));
}

function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}

function defaultStats(){return {totalQ:0,totalOk:0,aQ:0,aOk:0,bQ:0,bOk:0,streak:0,lastDay:'',bestByLevel:{}};}

function loadData(){
  try{
    const raw=localStorage.getItem('chord_v5');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}
function saveData(){
  try{localStorage.setItem('chord_v5',JSON.stringify({
    nickname:S.nickname,
    extraA_A:S.extraA_A,extraB_A:S.extraB_A,extraC_A:S.extraC_A,
    extraA_B:S.extraA_B,extraB_B:S.extraB_B,extraC_B:S.extraC_B,
    stats:S.stats,
  }));}catch(e){}
}

function updateStreak(){
  const today=todayKey();
  const st=S.stats;
  if(st.lastDay===today)return;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yKey=`${yesterday.getFullYear()}-${yesterday.getMonth()}-${yesterday.getDate()}`;
  if(st.lastDay===yKey)st.streak=(st.streak||0)+1;
  else st.streak=1;
  st.lastDay=today;
}

function addStats(game,correct,total,levelKey){
  const st=S.stats;
  st.totalQ=(st.totalQ||0)+total;
  st.totalOk=(st.totalOk||0)+correct;
  if(game==='A'){st.aQ=(st.aQ||0)+total;st.aOk=(st.aOk||0)+correct;}
  else{st.bQ=(st.bQ||0)+total;st.bOk=(st.bOk||0)+correct;}
  const pct=Math.round(correct/total*100);
  const key=game+levelKey;
  if(!st.bestByLevel)st.bestByLevel={};
  if(!st.bestByLevel[key]||pct>st.bestByLevel[key])st.bestByLevel[key]=pct;
  updateStreak();
  saveData();
}

function aDisp(){
  const{ansRoot:r,ansAcc:ac,ansQuality:q,ansMaj:maj,ansExt:ext}=S;
  if(!r)return '';
  let s=r+ac;
  if(q)s+=q==='o'?'°':q==='ø'?'ø':q;
  if(maj)s+='△';
  if(ext)s+=ext;
  return s;
}
function aCid(){
  const{ansQuality:q,ansMaj:maj,ansExt:ext}=S;
  if(!q&&!ext&&!maj)return 'M';
  if(q==='sus4'&&!ext)return 'sus4';
  if(q==='sus2'&&!ext)return 'sus2';
  let key=q==='o'?'o':q==='ø'?'ø':q==='+'?'+':q==='m'?'m':'';
  if(!ext)return key||'M';
  const M=maj?'M':'';
  if(ext==='6'){if(key==='m')return 'm6';return '6';}
  if(ext==='7'){
    if(key==='o')return 'o7';if(key==='ø')return 'ø7';
    if(key==='+')return M?'+M7':'+7';
    if(key==='m')return M?'mM7':'m7';
    return M?'M7':'7';
  }
  if(ext==='9'){if(key==='m')return 'm9';return M?'M9':'9';}
  if(ext==='add9'){if(key==='m')return 'madd9';return 'add9';}
  if(ext==='13'){if(key==='m')return 'm13';return '13';}
  return 'M';
}
function aCanSub(){return !S.submitted&&S.ansRoot!=='';}
function aOk(){
  const q=S.pool[S.qIdx],uRoot=S.ansRoot+S.ansAcc;
  const eh={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb','Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
  const rOk=uRoot===q.root||eh[uRoot]===q.root||uRoot===eh[q.root];
  return rOk&&aCid()===q.cid;
}

// ══════════════════════════════════════════
// GAME B
// ══════════════════════════════════════════
// bNotes: array of note name strings e.g. ['G#','B','D#']
// bPending: note name being built e.g. 'G'
// bPendingAcc: acc modifier '#','b','##','bb',''

function bCorrectPcs(){
  // Expected: set of pc values from chord note names
  return new Set(S.pool[S.qIdx].noteNames.map(nn=>{
    const midi=noteNameToMidi(nn);
    return ((midi%12)+12)%12;
  }));
}
function bEnteredPcs(){
  return new Set(S.bNotes.map(nn=>{
    const midi=noteNameToMidi(nn);
    return ((midi%12)+12)%12;
  }));
}
function bOk(){
  const exp=bCorrectPcs(),got=bEnteredPcs();
  if(exp.size!==got.size)return false;
  for(const v of exp)if(!got.has(v))return false;
  // Strict: note names must match exactly
  const expNames=new Set(S.pool[S.qIdx].noteNames);
  const gotNames=new Set(S.bNotes);
  if(expNames.size!==gotNames.size)return false;
  for(const v of expNames)if(!gotNames.has(v))return false;
  return true;
}
function bCanSub(){return !S.submitted&&S.bNotes.length>0;}

// Get pc for a note name
function notePc(nn){return ((noteNameToMidi(nn)%12)+12)%12;}

// Key color for a note name button (after submission)
// 'correct' = exact match, 'enharmonic' = same pc different name, 'wrong' = not in chord
function bKeyColor(noteName){
  if(!S.submitted)return '';
  const expNames=new Set(S.pool[S.qIdx].noteNames);
  const expPcs=bCorrectPcs();
  const pc=notePc(noteName);
  if(expNames.has(noteName))return 'correct';
  if(expPcs.has(pc))return 'enharmonic';
  return '';
}

function rGameB(app){
  const q=S.pool[S.qIdx];
  app.innerHTML=`<div id="GR" style="display:flex;flex-direction:column;gap:8px">
  <div class="hdr">
    <span class="lv-badge b">${lvLabel()}</span>
    <span class="hdr-mid" id="HP">第 ${S.qIdx+1} / 10 題</span>
    <span class="hdr-score" id="HS">✓ ${S.correct}</span>
  </div>
  <span class="hdr-back" onclick="goLevel('B')">← 返回選關</span>
  <div class="staff-card">
    <div id="BCN" style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px">${q?q.display:''}</div>
    <div class="q-label">按出所有組成音符</div>
    <div id="STF"></div>
  </div>
  <div class="answer-box" id="AB">
    <div style="flex:1">
      <div class="answer-text" id="AT" style="font-size:18px">─</div>
      <div id="AH" style="font-size:11px;color:#bbb">作答區・再按同一音名確認加入</div>
    </div>
    <div id="AI" style="font-size:22px"></div>
  </div>
  ${rBKbd()}
  <div class="actions">
    <button class="btn primary b" id="BS" onclick="bSub()" disabled>送出</button>
    <button class="btn next-btn" id="BN" onclick="bNext()" disabled>下一題 →</button>
  </div></div>`;
  setTimeout(()=>{const e=document.getElementById('STF');if(e)drawStaff([],e);},10);
}

function rBKbd(){
  const accKeys=[
    {label:'𝄫 bb',val:'bb'},
    {label:'♭ b',val:'b'},
    {label:'♯ #',val:'#'},
    {label:'𝄪 ##',val:'##'},
  ];
  return `<div class="kbd">
    <div class="kbd-section">
      <div class="kbd-label">音名（再按同一個 = 確認加入）</div>
      <div class="kbd-row" id="B-note-row">
        ${NOTES.map(n=>`<div class="key" id="BN-${n}" onclick="bNote('${n}')">${n}</div>`).join('')}
      </div>
    </div>
    <div class="kbd-section">
      <div class="kbd-label">升降修飾</div>
      <div class="kbd-row">
        ${accKeys.map(a=>`<div class="key" id="BA-${a.val}" onclick="bAcc('${a.val}')">${a.label}</div>`).join('')}
        <div class="key" style="flex:0.8" onclick="bDel()">⌫</div>
      </div>
    </div>
  </div>`;
}

function uGameB(){
  const q=S.pool[S.qIdx];
  const ok=S.submitted&&bOk(),bad=S.submitted&&!ok;
  const ab=document.getElementById('AB');if(ab)ab.className='answer-box'+(S.submitted?(ok?' correct':' wrong'):'');
  // Pending + entered display
  const pendingStr=S.bPending?(S.bPending+S.bPendingAcc+'?'):'';
  const enteredStr=S.bNotes.join('  ');
  const dispStr=[enteredStr,pendingStr].filter(Boolean).join('  ');
  const at=document.getElementById('AT');if(at)at.textContent=dispStr||'─';
  const ah=document.getElementById('AH');
  if(ah){
    if(bad){ah.style.color='#A32D2D';ah.textContent=`正確：${q.noteNames.join('  ')}`;}
    else if(S.submitted&&ok){ah.style.color='#085041';ah.textContent='正確！';}
    else{ah.style.color='#bbb';ah.textContent='作答區・再按同一音名確認加入';}
  }
  const ai=document.getElementById('AI');if(ai)ai.textContent=S.submitted?(ok?'✅':'❌'):'';
  const hp=document.getElementById('HP');if(hp)hp.textContent=`第 ${S.qIdx+1} / 10 題`;
  const hs=document.getElementById('HS');if(hs)hs.textContent=`✓ ${S.correct}`;

  // Note buttons
  NOTES.forEach(n=>{
    const e=document.getElementById('BN-'+n);if(!e)return;
    const isPending=S.bPending===n;
    const isEntered=S.bNotes.some(nn=>nn[0]===n&&nn.slice(1)===(S.bPendingAcc||''))||false;
    // Color logic after submit
    if(S.submitted){
      const col=bKeyColor(n+(S.bPendingAcc||''));
      if(col==='correct')e.style.background='#1D9E75',e.style.color='#fff';
      else if(col==='enharmonic')e.style.background='#FEF3C7',e.style.color='#92400E';
      else e.style.background='';e.style.color='';
    } else {
      e.style.background='';e.style.color='';
    }
    e.className='key'+(isPending?' pending':'');
  });

  // Show correct/enharmonic on all note buttons after submit
  if(S.submitted){
    NOTES.forEach(n=>{
      const e=document.getElementById('BN-'+n);if(!e)return;
      const pc=notePc(n);
      const expPcs=bCorrectPcs();
      const expNames=new Set(q.noteNames);
      if(expNames.has(n)){e.style.background='#1D9E75';e.style.color='#fff';}
      else if(expPcs.has(pc)){e.style.background='#FEF3C7';e.style.color='#92400E';}
      else{e.style.background='';e.style.color='';}
    });
  }

  // Acc buttons
  [['bb','BA-bb'],['b','BA-b'],['#','BA-#'],['##','BA-##']].forEach(([v,id])=>{
    const e=document.getElementById(id);if(e)e.className='key'+(S.bPendingAcc===v?' active b':'');
  });

  const bs=document.getElementById('BS');if(bs)bs.disabled=!bCanSub();
  const bn=document.getElementById('BN');if(bn)bn.disabled=!S.submitted;

  // Draw staff
  const rootMidi=ROOT_MIDI_MAP[q.root];
  const staffNotes=S.bNotes.map(nn=>noteNameToStaff(nn,rootMidi));
  const el=document.getElementById('STF');
  if(el)drawStaff(staffNotes,el,staffNotes.map(n=>n.midi));
}

function bNote(n){
  if(S.submitted)return;
  sfxClick();
  if(S.bPending===n){
    // Confirm: add note with current acc
    const noteName=n+S.bPendingAcc;
    // Don't add duplicate
    if(!S.bNotes.includes(noteName)){
      S.bNotes.push(noteName);
      const q=S.pool[S.qIdx];
      const{midi}=noteNameToStaff(noteName,ROOT_MIDI_MAP[q.root]);
      piano(midi,0.15);
    }
    S.bPending='';S.bPendingAcc='';
  } else {
    // Start pending
    S.bPending=n;S.bPendingAcc='';
  }
  uGameB();
}
function bAcc(a){
  if(S.submitted)return;sfxClick();
  S.bPendingAcc=S.bPendingAcc===a?'':a;
  uGameB();
}
function bDel(){
  if(S.submitted)return;sfxClick();
  if(S.bPending){S.bPending='';S.bPendingAcc='';}
  else S.bNotes.pop();
  uGameB();
}

function bSub(){
  if(!bCanSub())return;
  // If there's a pending note, discard it (not confirmed)
  S.bPending='';S.bPendingAcc='';
  S.submitted=true;const ok=bOk();
  if(ok){S.correct++;sfxOk();}else sfxFail();
  playChord(S.pool[S.qIdx].midis,ok);
  S.history.push({q:S.pool[S.qIdx],user:S.bNotes.join(' '),ok});
  uGameB();
}
function bNext(){
  if(S.qIdx>=9){
    addStats('B',S.correct,10,S.levelKey);
    S.screen='sum';render();return;
  }
  sfxClick();S.qIdx++;S.submitted=false;S.bNotes=[];S.bPending='';S.bPendingAcc='';
  uGameB();
  const cn=document.getElementById('BCN');if(cn)cn.textContent=S.pool[S.qIdx].display;
  setTimeout(()=>{const e=document.getElementById('STF');if(e)drawStaff([],e);},10);
}

// ══════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════
function rSum(app){
  const isA=S.game==='A';
  const pct=Math.round(S.correct/10*100),passed=pct>=90;
  if(passed)setTimeout(sfxWin,200);
  app.innerHTML=`<div class="summary">
    <div style="font-size:16px;font-weight:700;color:#1a1a1a">${isA?'🎼':'🎹'} ${lvLabel()} 結果</div>
    <div class="sum-stats">
      <div class="stat-box"><div class="stat-num">${S.correct}</div><div class="stat-lbl">答對</div></div>
      <div class="stat-box"><div class="stat-num">${10-S.correct}</div><div class="stat-lbl">答錯</div></div>
      <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">正確率</div></div>
    </div>
    <div class="pass-msg ${passed?'pass':'fail'}">${passed?'🎉 通過！':'😅 再加油！需達 90% 才晉級'}</div>
    <div class="sum-list">${(S.history||[]).map((h,i)=>`
      <div class="sum-item ${h.ok?'ok':'bad'}">
        <div style="font-size:14px;flex-shrink:0">${h.ok?'✅':'❌'}</div>
        <div>
          <div style="font-size:11px;color:#999">題 ${i+1}｜${h.q.display}</div>
          <div style="font-weight:600;font-size:13px;color:#1a1a1a">${h.user}${!h.ok?'　→　正確：'+h.q.noteNames.join('  '):''}</div>
        </div>
      </div>`).join('')}
    </div>
    <button class="btn-full${isA?'':' b'}" onclick="goLevel('${S.game}')">返回選關</button>
    <button class="btn-sec" onclick="startGame('${S.levelKey}')">再練一次</button>
    <button class="btn-sec" onclick="goHome()">回首頁</button>
  </div>`;
}

// ══════════════════════════════════════════

render();
if('serviceWorker' in navigator){
  const sw=`const C='cv6';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
